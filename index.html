    // --- AUTH HOOK ---
    function useAuth() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!auth) { setLoading(false); return; }
        return auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
      }, []);

      const signIn = async () => {
        setError(null);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ hd: "myunisoft.fr" });
          await auth.signInWithPopup(provider);
        } catch (e) {
          setError(e.message);
        }
      };

      const signOut = async () => { await auth.signOut(); };

      return { user, loading, error, signIn, signOut };
    }

    // --- FIREBASE DB HOOK ---
    function useFirebase(path, defaultVal, enabled) {
      const [data, setData] = useState(defaultVal);
      const [status, setStatus] = useState("connecting");

      useEffect(() => {
        if (!enabled || !db) { setStatus("offline"); return; }
        const ref = db.ref(path);
        const handler = ref.on("value", (snap) => {
          const val = snap.val();
          setData(val ? Object.values(val) : []);
          setStatus("synced");
        }, (err) => { setStatus("error"); console.error(err); });
        return () => ref.off("value", handler);
      }, [path, enabled]);

      const setItems = useCallback(async (newData) => {
        if (!db) return;
        setStatus("saving");
        const obj = {};
        newData.forEach((item) => { obj[item.id] = item; });
        await db.ref(path).set(obj);
        setStatus("synced");
      }, [path]);

      const pushItem = useCallback(async (item) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + item.id).set(item);
        setStatus("synced");
      }, [path]);

      const removeItem = useCallback(async (id) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + id).remove();
        setStatus("synced");
      }, [path]);

      const updateItem = useCallback(async (id, updates) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + id).update(updates);
        setStatus("synced");
      }, [path]);

      return { data, status, setItems, pushItem, removeItem, updateItem };
    }

    // --- MAIN APP ---
    function BackstageDebrief() {
      const { user, loading: authLoading, error: authError, signIn, signOut } = useAuth();
      const isAuthed = !!user;
      const userName = user?.displayName?.split(" ")[0] || "Anonyme";
      const isAdmin = ADMIN_EMAILS.includes(user?.email);

      const todayKey = new Date().toISOString().split("T")[0];
      const [sprintDateKey, setSprintDateKey] = useState(null);
      const [cfgLoaded, setCfgLoaded] = useState(false);

      useEffect(() => {
        if (!isAuthed || !db) return;
        const ref = db.ref("config/sprintDate");
        ref.on("value", (snap) => {
          setSprintDateKey(snap.val() || null);
          setCfgLoaded(true);
        });
        return () => ref.off("value");
      }, [isAuthed]);

      const sprintDateLabel = sprintDateKey
        ? new Date(sprintDateKey + "T12:00:00").toLocaleDateString("fr-FR")
        : "—";

      const needsDateSetup = isAdmin && cfgLoaded && sprintDateKey !== todayKey;

      const saveSprintDate = (date) => {
        if (db) db.ref("config/sprintDate").set(date);
      };

      const fb = useFirebase(`retro-${sprintDateKey || todayKey}/feedbacks`, [], isAuthed && cfgLoaded);
      const act = useFirebase(`retro-${sprintDateKey || todayKey}/actions`, [], isAuthed && cfgLoaded);
      const rat = useFirebase(`retro-${sprintDateKey || todayKey}/ratings`, [], isAuthed && cfgLoaded);
      const feedbacks = fb.data;
      const actions = act.data;
      const ratingsRaw = rat.data;

      const RATING_CATEGORIES = [
        { id: "ambiance", label: "Ambiance du Sprint", color: "#7C3AED", bg: "#F5F3FF", border: "#A78BFA" },
        { id: "satisfaction", label: "Satisfaction Travail", color: "#059669", bg: "#ECFDF5", border: "#10B981" },
        { id: "roti", label: "ROTI", color: "#D97706", bg: "#FFFBEB", border: "#F59E0B" },
      ];
      const RATING_LABELS = {
        1: { emoji: "💀", label: "Silence de mort" },
        2: { emoji: "🎵", label: "Fausse note" },
        3: { emoji: "🎸", label: "En rodage" },
        4: { emoji: "🤘", label: "Ça groove !" },
        5: { emoji: "⭐", label: "Épique !" },
      };

      const getRatingsForCategory = (catId) => Array.isArray(ratingsRaw) ? ratingsRaw.filter(r => r.category === catId) : [];
      const getMyRating = (catId) => Array.isArray(ratingsRaw) ? ratingsRaw.find(r => r.category === catId && r.authorUid === user?.uid) : null;

      // --- PRÉSENCE ---
      const [connectedUsers, setConnectedUsers] = useState([]);
      useEffect(() => {
        if (!isAuthed || !db || !sprintDateKey) return;
        const presenceRef = db.ref(`retro-${sprintDateKey}/presence/${user.uid}`);
        const allRef = db.ref(`retro-${sprintDateKey}/presence`);
        const connectedRef = db.ref(".info/connected");

        const registerPresence = () => {
          presenceRef.set({ name: userName, uid: user.uid, lastSeen: Date.now() });
          presenceRef.onDisconnect().remove();
        };

        // Re-register on reconnect
        connectedRef.on("value", snap => {
          if (snap.val() === true) registerPresence();
        });

        // Heartbeat every 30s
        const heartbeat = setInterval(() => {
          presenceRef.update({ lastSeen: Date.now() });
        }, 30000);

        // Listen to all presence entries, filter stale (>90s)
        allRef.on("value", snap => {
          const val = snap.val();
          if (!val) { setConnectedUsers([]); return; }
          const now = Date.now();
          const entries = Object.entries(val);
          const active = [];
          entries.forEach(([uid, u]) => {
            if (u.lastSeen && (now - u.lastSeen) < 90000) {
              active.push(u);
            } else if (!u.lastSeen || (now - u.lastSeen) >= 90000) {
              // Nettoyer les entrées fantômes
              db.ref(`retro-${sprintDateKey}/presence/${uid}`).remove();
            }
          });
          setConnectedUsers(active);
        });

        // Cleanup on page unload
        const handleUnload = () => presenceRef.remove();
        window.addEventListener("beforeunload", handleUnload);

        return () => {
          clearInterval(heartbeat);
          presenceRef.remove();
          allRef.off("value");
          connectedRef.off("value");
          window.removeEventListener("beforeunload", handleUnload);
        };
      }, [isAuthed, sprintDateKey, user?.uid]);

      const connectedUids = connectedUsers.map(u => u.uid);
      const everyoneVotedFor = (catId) => connectedUids.length > 0 &&
        connectedUids.every(uid =>
          Array.isArray(ratingsRaw) && ratingsRaw.some(r => r.category === catId && r.authorUid === uid)
        );

      const [curtainTriggered, setCurtainTriggered] = useState({});
      const [showResults, setShowResults] = useState({});

      useEffect(() => {
        ["ambiance", "satisfaction", "roti"].forEach(catId => {
          if (everyoneVotedFor(catId) && !curtainTriggered[catId]) {
            setCurtainTriggered(prev => ({ ...prev, [catId]: true }));
            setTimeout(() => setShowResults(prev => ({ ...prev, [catId]: true })), 1600);
          }
        });
      }, [ratingsRaw, connectedUids.length]);

      const RATING_CAT_LABELS = { ambiance: "Ambiance du Sprint", satisfaction: "Satisfaction Travail", roti: "ROTI" };
      const activeCurtain = ["ambiance","satisfaction","roti"].find(id => curtainTriggered[id] && !showResults[id]) || null;
      const submitRating = (catId, score) => {
        const existing = getMyRating(catId);
        if (existing) { rat.updateItem(existing.id, { score }); }
        else { rat.pushItem({ id: Date.now(), category: catId, score, author: userName, authorUid: user.uid }); }
      };
      const getAvg = (catId) => {
        const items = getRatingsForCategory(catId);
        if (!items.length) return null;
        return (items.reduce((s, r) => s + r.score, 0) / items.length).toFixed(1);
      };

      const [selectedCat, setSelectedCat] = useState("rock");
      const [feedbackText, setFeedbackText] = useState("");
      const [actionDesc, setActionDesc] = useState("");
      const [actionResp, setActionResp] = useState("");
      const [editingFeedback, setEditingFeedback] = useState(null);
      const [editingAction, setEditingAction] = useState(null);
      const [showPresence, setShowPresence] = useState(false);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [showIntegration, setShowIntegration] = useState(false);

      // Fermer les dropdowns au clic en dehors
      useEffect(() => {
        const handleClickOutside = (e) => {
          if (!e.target.closest("[data-dropdown]")) {
            setShowPresence(false);
            setShowUserMenu(false);
            setShowIntegration(false);
          }
        };
        document.addEventListener("click", handleClickOutside);
        return () => document.removeEventListener("click", handleClickOutside);
      }, []);
      const [zoomedImage, setZoomedImage] = useState(null);
      const [showPitTooltip, setShowPitTooltip] = useState(false);
      const [confluenceStatus, setConfluenceStatus] = useState(null);
      const [confluenceUrl, setConfluenceUrl] = useState(null);
      const feedbackInputRef = useRef(null);

      if (authLoading || (isAuthed && !cfgLoaded)) {
        return (
          <div style={{ minHeight: "100vh", background: "#FEF7ED", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 48 }}>🥁</div>
          </div>
        );
      }

      if (!isAuthed) {
        return <LoginScreen onSignIn={signIn} error={authError} loading={authLoading} />;
      }

      if (needsDateSetup) {
        return <SprintDateScreen onSave={saveSprintDate} />;
      }

      if (!sprintDateKey) {
        return (
          <div style={{ minHeight: "100vh", background: "#FEF7ED", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ textAlign: "center", color: "#6B7280", fontSize: 15 }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>⏳</div>
              En attente de la configuration du sprint par l'animateur…
            </div>
          </div>
        );
      }

      const overallStatus = [fb.status, act.status].includes("error") ? "error"
        : [fb.status, act.status].includes("saving") ? "saving"
        : [fb.status, act.status].includes("connecting") ? "connecting" : "synced";

      const addFeedback = () => {
        if (!feedbackText.trim()) return;
        fb.pushItem({ id: Date.now(), category: selectedCat, text: feedbackText.trim(), author: userName, authorUid: user.uid });
        setFeedbackText("");
        feedbackInputRef.current?.focus();
      };
      const addAction = () => {
        if (!actionDesc.trim() || actions.length >= 3) return;
        act.pushItem({ id: Date.now(), description: actionDesc.trim(), responsable: actionResp.trim(), done: false, authorUid: user.uid });
        setActionDesc(""); setActionResp("");
      };
      const CONFLUENCE_FUNCTION_URL = "https://clinquant-strudel-f17230.netlify.app/.netlify/functions/export-confluence";

      const generateMarkdown = () => {
        const dateLabel = sprintDateKey || new Date().toISOString().split("T")[0];
        const rock = feedbacks.filter(f => f.category === "rock");
        const fausse = feedbacks.filter(f => f.category === "fausse");
        const ameliorer = feedbacks.filter(f => f.category === "ameliorer");
        const ambianceVotes = Array.isArray(ratingsRaw) ? ratingsRaw.filter(r => r.category === "ambiance") : [];
        const satisfactionVotes = Array.isArray(ratingsRaw) ? ratingsRaw.filter(r => r.category === "satisfaction") : [];
        const rotiVotes = Array.isArray(ratingsRaw) ? ratingsRaw.filter(r => r.category === "roti") : [];
        const avg = (items) => items.length ? (items.reduce((s, r) => s + r.score, 0) / items.length).toFixed(1) : "—";
        const LABELS = { 1: "💀 Silence de mort", 2: "🎵 Petite étincelle", 3: "🎸 En rodage", 4: "🥳 Ça groove !", 5: "⭐ Épique !" };

        const lines = [];
        lines.push(`# 🥁 Rétro Sprint — ${dateLabel}`);
        lines.push(`> Exporté le ${new Date().toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" })}`);
        lines.push("");
        lines.push("## 🎙️ Ressenti du Sprint");
        lines.push("");
        lines.push("| Thème | Moyenne | Votes |");
        lines.push("|---|---|---|");
        lines.push(`| 🥳 Ambiance du Sprint | **${avg(ambianceVotes)} / 5** | ${ambianceVotes.map(v => `${v.author} ${LABELS[v.score]?.split(" ")[0]}`).join(", ") || "—"} |`);

        lines.push("## 🎸 Ce qui a rocké");
        lines.push("");
        if (rock.length) rock.forEach(f => lines.push(`- ${f.text}${f.author ? ` *(${f.author})*` : ""}`));

        lines.push("");
        lines.push("## 🔇 Les fausses notes");
        lines.push("");

        lines.push("## 💫 À améliorer");

        lines.push("");
        return lines.join("\n");

                        <img src="https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/ambiance.png" onClick={() => setZoomedImage("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/ambiance.png")} style={{ width: 30, height: 30, objectFit: "contain", background: "none", cursor: "pointer" }} />
                      ) : cat.id === "satisfaction" ? (
                        <img src="https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/satisfaction.png" onClick={() => setZoomedImage("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/satisfaction.png")} style={{ width: 30, height: 30, borderRadius: "50%", objectFit: "cover", background: "none", cursor: "pointer" }} />
                      ) : null}
                      {cat.label}
                    </div>
                      <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 12 }}>
                        {[1,2,3,4,5].map(score => (
                          <button key={score} onClick={() => submitRating(cat.id, score)} style={{
                            width: 52, height: 52, borderRadius: "50%", border: myScore === score ? "2.5px solid " + cat.color : "1.5px solid #E5E7EB",
                            background: myScore === score ? cat.bg : "#F9FAFB",
                            fontSize: 26, cursor: "pointer", transition: "all 0.2s",
                            transform: myScore === score ? "scale(1.15)" : "scale(1)",
                            boxShadow: myScore === score ? "0 2px 8px " + cat.border + "88" : "none",
                          }} title={RATING_LABELS[score].label}>{RATING_LABELS[score].emoji}</button>
                        ))}
                      </div>
                      {myScore && (
                        <div style={{ fontSize: 11.5, color: cat.color, fontWeight: 600, marginBottom: 8 }}>
                          Tu as voté : {RATING_LABELS[myScore].emoji} {RATING_LABELS[myScore].label}
                        </div>
                      )}
                      {!showResults[cat.id] && (
                        <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 4, borderTop: "1px solid " + cat.border + "33", paddingTop: 8 }}>
                          {myScore ? (
                            connectedUids.length > 0 ? (
                              <>🔒 {getRatingsForCategory(cat.id).length}/{connectedUids.length} vote{connectedUids.length > 1 ? "s" : ""}</>
                            ) : null
                          ) : (
                            <>Choisis ton emoji pour voter 👆</>
                          )}
                        </div>
                      )}
                      <div style={{ position: "relative", marginTop: 6 }}>
                        {showResults[cat.id] && (
                          <div style={{ borderTop: "1px solid " + cat.border + "44", paddingTop: 16, animation: "resultReveal 0.6s ease forwards" }}>
                            <div style={{ fontSize: 48, marginBottom: 4 }}>{RATING_LABELS[Math.round(avg)]?.emoji}</div>
                            <div style={{ fontSize: 38, fontWeight: 900, color: cat.color, lineHeight: 1 }}>{avg}</div>
                            <div style={{ fontSize: 13, color: "#6B7280", marginBottom: 10 }}>/ 5 — {RATING_LABELS[Math.round(avg)]?.label}</div>
                            {/* Barre de progression */}
                            <div style={{ background: "#E5E7EB", borderRadius: 99, height: 8, margin: "0 8px 12px", overflow: "hidden" }}>
                              <div style={{ height: "100%", borderRadius: 99, background: cat.color, width: (avg / 5 * 100) + "%", transition: "width 1s ease" }} />
                            </div>
                            <div style={{ fontSize: 10.5, color: "#9CA3AF", marginBottom: 8 }}>{voters.length} vote{voters.length > 1 ? "s" : ""}</div>
                            <div style={{ display: "flex", justifyContent: "center", gap: 4, flexWrap: "wrap" }}>
                              {voters.map(v => (
                                <span key={v.id} style={{ fontSize: 11, background: cat.bg, color: cat.color, borderRadius: 8, padding: "3px 8px", fontWeight: 600 }}>
                                  {RATING_LABELS[v.score]?.emoji} {v.author}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 3 COLUMNS */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 18, marginBottom: 24 }}>
              {CATEGORIES.map(cat => {
                const col = COLUMN_MAP[cat.id];
                const items = getFeedbacksByCategory(cat.id);
                return (
                  <div key={cat.id} style={{ background: "#fff", borderRadius: 16, border: "2px solid " + col.border, minHeight: 130, padding: "20px 18px" }}>
                    <div style={{ fontSize: 17, fontWeight: 700, color: col.color, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 26 }}>{col.title.split(" ")[0]}</span>
                      <span>{col.title.split(" ").slice(1).join(" ")}</span>
                      {items.length > 0 && <span style={{ fontSize: 11, fontWeight: 600, background: col.border + "20", color: col.color, borderRadius: 10, padding: "1px 8px" }}>{items.length}</span>}
                    </div>
                    {items.length === 0 && <div style={{ fontSize: 12.5, color: "#9CA3AF", fontStyle: "italic", padding: "6px 0" }}>Aucun retour pour le moment</div>}
                    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                      {items.map(fbk => {
                        const isOwner = fbk.authorUid === user?.uid;
                        return (
                        <div key={fbk.id} style={{ background: cat.bg, borderRadius: 10, padding: "9px 11px", fontSize: 13, color: "#1F2937", display: "flex", alignItems: "flex-start", gap: 8, border: "1px solid " + col.border + "33", animation: "fadeIn 0.3s ease" }}>
                          {editingFeedback === fbk.id ? (
                            <input autoFocus defaultValue={fbk.text}
                              onBlur={e => { fb.updateItem(fbk.id, { text: e.target.value.trim() || fbk.text }); setEditingFeedback(null); }}
                              onKeyDown={e => e.key === "Enter" && (fb.updateItem(fbk.id, { text: e.target.value.trim() || fbk.text }), setEditingFeedback(null))}
                              style={{ flex: 1, border: "none", background: "transparent", fontSize: 13, fontFamily: "inherit", color: "#1F2937" }}
                            />
                          ) : (
                            <div style={{ flex: 1 }}>
                              <div style={{ cursor: isOwner ? "pointer" : "default" }} onClick={() => isOwner && setEditingFeedback(fbk.id)}>{fbk.text}</div>
                              {fbk.author && <div style={{ fontSize: 10.5, color: col.color, marginTop: 3, opacity: 0.7 }}>— {fbk.author}</div>}
                            </div>
                          )}
                          {isOwner && (
                            <button onClick={() => fb.removeItem(fbk.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "#9CA3AF", padding: 0, lineHeight: 1, flexShrink: 0 }}
                              onMouseEnter={e => e.target.style.color = "#EF4444"} onMouseLeave={e => e.target.style.color = "#9CA3AF"}>✕</button>
                          )}
                        </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* AJOUTER UN RETOUR */}
            <div className="no-print" style={{ background: "#fff", borderRadius: 16, border: "1px solid #E5E7EB", padding: "20px 24px", marginBottom: 24 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#1F2937", marginBottom: 12 }}>✍ Ajouter un retour</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                {CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                    padding: "5px 15px", borderRadius: 16, fontSize: 12.5, cursor: "pointer",
                    fontWeight: selectedCat === cat.id ? 600 : 500, transition: "all 0.2s",
                    border: selectedCat === cat.id ? "none" : "1.5px solid " + cat.border,
                    background: selectedCat === cat.id ? cat.color : "transparent",
                    color: selectedCat === cat.id ? "#fff" : cat.color,
                  }}>{cat.label}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <input ref={feedbackInputRef} type="text" value={feedbackText}
                  onChange={e => setFeedbackText(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addFeedback()}
                  placeholder="Votre retour..."
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "1px solid #D1D5DB", fontSize: 13.5, background: "#F9FAFB" }}
                  onFocus={e => e.target.style.borderColor = CATEGORIES.find(c => c.id === selectedCat).border}
                  onBlur={e => e.target.style.borderColor = "#D1D5DB"}
                />
                <button onClick={addFeedback} style={{ width: 42, height: 42, borderRadius: 10, border: "none", background: "#7C3AED", color: "#fff", fontSize: 22, fontWeight: 700, cursor: "pointer" }}>+</button>
              </div>
            </div>

 		   {/* ROTI */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#1F2937", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0%" stopColor="#FFD700"/>
                      <stop offset="50%" stopColor="#FFA500"/>
                      <stop offset="100%" stopColor="#B8860B"/>
                    </linearGradient>
                  </defs>
                  <rect x="9" y="2" width="6" height="11" rx="3" fill="url(#goldGrad2)" stroke="#B8860B" strokeWidth="0.5"/>
                  <path d="M5 11a7 7 0 0 0 14 0" stroke="url(#goldGrad2)" strokeWidth="2" strokeLinecap="round" fill="none"/>
                  <line x1="12" y1="18" x2="12" y2="21" stroke="url(#goldGrad2)" strokeWidth="2" strokeLinecap="round"/>
                  <line x1="9" y1="21" x2="15" y2="21" stroke="url(#goldGrad2)" strokeWidth="2" strokeLinecap="round"/>
                </svg>
                Le ressenti de la Rétro
              </div>
              {(() => {
                const cat = { id: "roti", label: "ROTI", color: "#D97706", bg: "#FFFBEB", border: "#F59E0B" };
                const myRating = getMyRating(cat.id);
                const myScore = myRating?.score;
                const avg = getAvg(cat.id);
                const voters = getRatingsForCategory(cat.id);
                return (
                  <div style={{ background: "#fff", borderRadius: 14, border: "2px solid " + cat.border, padding: "20px 20px", textAlign: "center", maxWidth: 400 }}>
                    <div style={{ fontSize: 22, fontWeight: 700, color: cat.color, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "row", gap: 10 }}>
                      <img src="https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/ROTI.png" onClick={() => setZoomedImage("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/ROTI.png")} style={{ width: 30, height: 30, objectFit: "contain", display: "block", cursor: "pointer" }} />
                      <span>ROTI</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 12, marginTop: 12 }}>
                      {[1,2,3,4,5].map(score => (
                        <button key={score} onClick={() => submitRating(cat.id, score)} style={{
                          width: 52, height: 52, borderRadius: "50%", border: myScore === score ? "2.5px solid " + cat.color : "1.5px solid #E5E7EB",
                          background: myScore === score ? cat.bg : "#F9FAFB",
                          fontSize: 26, cursor: "pointer", transition: "all 0.2s",
                          transform: myScore === score ? "scale(1.15)" : "scale(1)",
                          boxShadow: myScore === score ? "0 2px 8px " + cat.border + "88" : "none",
                        }} title={RATING_LABELS[score].label}>{RATING_LABELS[score].emoji}</button>
                      ))}
                    </div>
                    {myScore && (
                      <div style={{ fontSize: 11.5, color: cat.color, fontWeight: 600, marginBottom: 8 }}>
                        Tu as voté : {RATING_LABELS[myScore].emoji} {RATING_LABELS[myScore].label}
                      </div>
                    )}
                    {!showResults[cat.id] && (
                      <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 4, borderTop: "1px solid " + cat.border + "33", paddingTop: 8 }}>
                        {myScore ? (
                          connectedUids.length > 0 ? (
                            <>🔒 {getRatingsForCategory(cat.id).length}/{connectedUids.length} vote{connectedUids.length > 1 ? "s" : ""}</>
                          ) : null
                        ) : (
                          <>Choisis ton emoji pour voter 👆</>
                        )}
                      </div>
                    )}
                    <div style={{ position: "relative", marginTop: 6 }}>
                      {showResults[cat.id] && (
                        <div style={{ borderTop: "1px solid " + cat.border + "44", paddingTop: 16, animation: "resultReveal 0.6s ease forwards" }}>
                          <div style={{ fontSize: 48, marginBottom: 4 }}>{RATING_LABELS[Math.round(avg)]?.emoji}</div>
                          <div style={{ fontSize: 38, fontWeight: 900, color: cat.color, lineHeight: 1 }}>{avg}</div>
                          <div style={{ fontSize: 13, color: "#6B7280", marginBottom: 10 }}>/ 5 — {RATING_LABELS[Math.round(avg)]?.label}</div>
                          {/* Barre de progression */}
                          <div style={{ background: "#E5E7EB", borderRadius: 99, height: 8, margin: "0 8px 12px", overflow: "hidden" }}>
                            <div style={{ height: "100%", borderRadius: 99, background: cat.color, width: (avg / 5 * 100) + "%", transition: "width 1s ease" }} />
                          </div>
                          <div style={{ fontSize: 10.5, color: "#9CA3AF", marginBottom: 8 }}>{voters.length} vote{voters.length > 1 ? "s" : ""}</div>
                          <div style={{ display: "flex", justifyContent: "center", gap: 4, flexWrap: "wrap" }}>
                            {voters.map(v => (
                              <span key={v.id} style={{ fontSize: 11, background: cat.bg, color: cat.color, borderRadius: 8, padding: "3px 8px", fontWeight: 600 }}>
                                {RATING_LABELS[v.score]?.emoji} {v.author}
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })()}
            </div>

 		   {/* ACTIONS */}
		<div style={{
		  borderRadius: 16, padding: 0, marginBottom: 24, position: "relative", overflow: "hidden", display: "flex", alignItems: "stretch", minHeight: 240,
		}}>
		  {/* Image de fond sur tout l'encart */}
		  <div style={{
		    position: "absolute", inset: 0,
		    backgroundImage: IMG_ACTIONS,
		    backgroundSize: "cover", backgroundPosition: "center top",
		    opacity: 0.45,
		  }} />
		  {/* Overlay dégradé unique : transparent à gauche → sombre à droite */}
		  <div style={{
		    position: "absolute", inset: 0,
		    background: "linear-gradient(to right, rgba(28,10,10,0.2) 0%, rgba(28,10,10,0.75) 25%, rgba(38,12,12,0.95) 40%, rgba(50,14,14,1) 55%, rgba(50,14,14,1) 100%)",
		  }} />

		  {/* Espace réservé à l'image (invisible, juste pour le layout) */}
		  <div style={{ width: 300, flexShrink: 0 }} />

              <div style={{ flex: 1, padding: "20px 24px", position: "relative", zIndex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#F97316" }}>🎯 Actions pour le prochain sprint</div>
                  <div style={{ border: "1.2px solid #F97316", borderRadius: 13, padding: "2px 12px", fontSize: 11, fontWeight: 600, color: "#F97316" }}>{actions.length}/3 max</div>
                </div>
                <div style={{ borderTop: "1px solid rgba(249,115,22,0.3)", marginBottom: 14 }} />

                {actions.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "12px 0", fontSize: 13.5, fontWeight: 600, color: "rgba(255,255,255,0.5)" }}>Aucune action définie pour le moment</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 10 }}>
                    {actions.map(action => (
                      <div key={action.id} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: "10px 12px", display: "flex", alignItems: "center", gap: 10, border: "1px solid rgba(249,115,22,0.25)", animation: "fadeIn 0.3s ease" }}>
                        <input type="checkbox" checked={action.done || false} onChange={() => act.updateItem(action.id, { done: !action.done })}
                          style={{ width: 17, height: 17, accentColor: "#F97316", cursor: "pointer", flexShrink: 0 }}
                        />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          {editingAction === action.id ? (
                            <input autoFocus defaultValue={action.description}
                              onBlur={e => { act.updateItem(action.id, { description: e.target.value }); setEditingAction(null); }}
                              onKeyDown={e => e.key === "Enter" && (act.updateItem(action.id, { description: e.target.value }), setEditingAction(null))}
                              style={{ width: "100%", border: "none", background: "transparent", fontSize: 13, fontFamily: "inherit", color: "#fff" }}
                            />
                          ) : (
                            <div onClick={() => action.authorUid === user?.uid && setEditingAction(action.id)} style={{ fontSize: 13, color: "rgba(255,255,255,0.9)", cursor: action.authorUid === user?.uid ? "pointer" : "default", textDecoration: action.done ? "line-through" : "none", opacity: action.done ? 0.5 : 1 }}>{action.description}</div>
                          )}
                          {action.responsable && <div style={{ fontSize: 11, color: "#F97316", marginTop: 1, fontWeight: 500, display: "flex", alignItems: "center", gap: 4 }}><img src="https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/assets/reu.png" style={{ width: 14, height: 14, objectFit: "contain" }} /> {action.responsable}</div>}
                        </div>
                        <button onClick={() => act.removeItem(action.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "rgba(255,255,255,0.35)", display: action.authorUid === user?.uid ? "block" : "none" }}
                          onMouseEnter={e => e.target.style.color = "#EF4444"} onMouseLeave={e => e.target.style.color = "rgba(255,255,255,0.35)"}>✕</button>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{ borderTop: "1px solid rgba(249,115,22,0.3)", marginBottom: 12, marginTop: 6 }} />

                {actions.length < 3 && (
                  <div className="no-print">
                    <div style={{ fontSize: 12.5, fontWeight: 600, color: "rgba(255,255,255,0.55)", marginBottom: 7 }}>Ajouter une action</div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                      <input type="text" value={actionDesc} onChange={e => setActionDesc(e.target.value)} onKeyDown={e => e.key === "Enter" && addAction()}
                        placeholder="Description de l'action..." style={{ flex: 2, minWidth: 180, padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.2)", fontSize: 12.5, background: "rgba(255,255,255,0.08)", color: "#fff" }}
                        onFocus={e => e.target.style.borderColor = "#F97316"} onBlur={e => e.target.style.borderColor = "rgba(255,255,255,0.2)"} />
                      <input type="text" value={actionResp} onChange={e => setActionResp(e.target.value)} onKeyDown={e => e.key === "Enter" && addAction()}
                        placeholder="Responsable..." style={{ flex: 1, minWidth: 130, padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.2)", fontSize: 12.5, background: "rgba(255,255,255,0.08)", color: "#fff" }}
                        onFocus={e => e.target.style.borderColor = "#F97316"} onBlur={e => e.target.style.borderColor = "rgba(255,255,255,0.2)"} />
                    </div>
                    <button onClick={addAction} style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #F97316, #EA580C)", color: "#fff", fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>+ Ajouter l'action</button>
                  </div>
                )}
              </div>
            </div>

            {/* FOOTER */}
            <div style={{ textAlign: "center", fontSize: 13.5, color: "#DB2777", fontStyle: "italic", opacity: 0.65, padding: "6px 0 16px" }}>
              "On repart avec 2-3 actions concrètes. L'idée : être un peu meilleurs pour le prochain set." 🤘
            </div>
          </div>

          <style>{`
            @keyframes curtainLeft {
        0%   { transform: translateX(-100%); }
        20%  { transform: translateX(0%); }
        80%  { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
      }
      @keyframes curtainRight {
        0%   { transform: translateX(100%); }
        20%  { transform: translateX(0%); }
        80%  { transform: translateX(0%); }
        100% { transform: translateX(100%); }
      }
      @keyframes curtainText {
        0%   { opacity: 0; transform: scale(0.5); }
        25%  { opacity: 1; transform: scale(1.1); }
        70%  { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.8); }
      }
      @keyframes resultReveal {
        0%   { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      } from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
            @keyframes tooltipFadeIn { 0% { opacity: 0; transform: translateX(-50%) translateY(6px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }
          `}</style>
          {zoomedImage && (
            <div onClick={() => setZoomedImage(null)} style={{
              position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 9999,
              display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
              backdropFilter: "blur(6px)",
            }}>
              <img src={zoomedImage} style={{ maxWidth: "80vw", maxHeight: "80vh", objectFit: "contain", borderRadius: 16, boxShadow: "0 12px 40px rgba(0,0,0,0.5)" }} />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BackstageDebrief />);
  </script>
</body>
</html>
