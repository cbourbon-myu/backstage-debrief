<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🥁 Backstage Debrief — Rétrospective Sprint</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #FEF7ED; }
    input:focus { outline: none; }
    button { font-family: inherit; }
    @media print { .no-print { display: none !important; } body { background: #fff; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.__IMG_HEADER__ = 'url("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/titre.jpg")';
	window.__IMG_RULES__ = 'url("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/neon.jpg")';
    window.__IMG_ACTIONS__ = 'url("https://raw.githubusercontent.com/cbourbon-myu/backstage-debrief/main/concert.jpg")';

    const firebaseConfig = {
      apiKey: "AIzaSyBPH2KoTL5kYXT5c7obYidciDuElmr2C7Y",
      authDomain: "backstage-debrief.firebaseapp.com",
      databaseURL: "https://backstage-debrief-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "backstage-debrief",
      storageBucket: "backstage-debrief.firebasestorage.app",
      messagingSenderId: "313402258283",
      appId: "1:313402258283:web:5f6ce5828effa0a519d22e"
    };

    let db = null;
    let auth = null;
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      auth = firebase.auth();
    } catch(e) {
      console.warn("Firebase init error:", e);
    }
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const IMG_HEADER = window.__IMG_HEADER__;
    const IMG_RULES = window.__IMG_RULES__;
    const IMG_ACTIONS = window.__IMG_ACTIONS__;

    const CATEGORIES = [
      { id: "rock", label: "🎸 A rocké", color: "#059669", bg: "#ECFDF5", border: "#10B981" },
      { id: "fausse", label: "🔇 Fausse note", color: "#D97706", bg: "#FFFBEB", border: "#F59E0B" },
      { id: "ameliorer", label: "💫 À améliorer", color: "#7C3AED", bg: "#F5F3FF", border: "#A78BFA" },
    ];
    const COLUMN_MAP = {
      rock: { title: "🎸 Ce qui a rocké", color: "#059669", border: "#10B981" },
      fausse: { title: "🔇 Les fausses notes", color: "#D97706", border: "#F59E0B" },
      ameliorer: { title: "💫 À améliorer", color: "#7C3AED", border: "#A78BFA" },
    };

    // --- AUTH HOOK ---
    function useAuth() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!auth) { setLoading(false); return; }
        return auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
      }, []);

      const signIn = async () => {
        setError(null);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ hd: "myunisoft.fr" });
          await auth.signInWithPopup(provider);
        } catch (e) {
          setError(e.message);
        }
      };

      const signOut = async () => { await auth.signOut(); };

      return { user, loading, error, signIn, signOut };
    }

    // --- FIREBASE DB HOOK ---
    function useFirebase(path, defaultVal, enabled) {
      const [data, setData] = useState(defaultVal);
      const [status, setStatus] = useState("connecting");

      useEffect(() => {
        if (!enabled || !db) { setStatus("offline"); return; }
        const ref = db.ref(path);
        const handler = ref.on("value", (snap) => {
          const val = snap.val();
          setData(val ? Object.values(val) : []);
          setStatus("synced");
        }, (err) => { setStatus("error"); console.error(err); });
        return () => ref.off("value", handler);
      }, [path, enabled]);

      const setItems = useCallback(async (newData) => {
        if (!db) return;
        setStatus("saving");
        const obj = {};
        newData.forEach((item) => { obj[item.id] = item; });
        await db.ref(path).set(obj);
        setStatus("synced");
      }, [path]);

      const pushItem = useCallback(async (item) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + item.id).set(item);
        setStatus("synced");
      }, [path]);

      const removeItem = useCallback(async (id) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + id).remove();
        setStatus("synced");
      }, [path]);

      const updateItem = useCallback(async (id, updates) => {
        if (!db) return;
        setStatus("saving");
        await db.ref(path + "/" + id).update(updates);
        setStatus("synced");
      }, [path]);

      return { data, status, setItems, pushItem, removeItem, updateItem };
    }

    // --- LOGIN SCREEN ---
    function LoginScreen({ onSignIn, error, loading }) {
      return (
        <div style={{ minHeight: "100vh", background: "#FEF7ED", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ background: "#fff", borderRadius: 24, padding: "48px 40px", maxWidth: 440, width: "90%", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.1)" }}>
            <img src="Batterie.png" style={{ width: 120, height: 120, borderRadius: "50%", marginBottom: 12, objectFit: "cover" }} />
            <div style={{ fontSize: 26, fontWeight: 800, color: "#1F2937", marginBottom: 4 }}>Backstage Debrief</div>
            <div style={{ fontSize: 13, color: "#6B7280", marginBottom: 8 }}>Sprint du 24/02/2026</div>
            <div style={{ fontSize: 12, color: "#9CA3AF", marginBottom: 32 }}>Réservé à l'équipe MyUnisoft GI</div>
            <button onClick={onSignIn} disabled={loading} style={{
              width: "100%", padding: "14px 0", borderRadius: 12, border: "1px solid #E5E7EB",
              background: "#fff", color: "#1F2937", fontSize: 15, fontWeight: 600,
              cursor: loading ? "wait" : "pointer", display: "flex", alignItems: "center",
              justifyContent: "center", gap: 10, transition: "all 0.2s",
            }}
              onMouseEnter={e => { if(!loading) e.target.style.background = "#F9FAFB"; }}
              onMouseLeave={e => e.target.style.background = "#fff"}
            >
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              {loading ? "Connexion…" : "Se connecter avec Google"}
            </button>
            {error && <div style={{ marginTop: 16, fontSize: 13, color: "#EF4444", background: "#FEF2F2", borderRadius: 8, padding: "8px 12px" }}>{error}</div>}
          </div>
        </div>
      );
    }

    // --- MAIN APP ---
    function BackstageDebrief() {
      const { user, loading: authLoading, error: authError, signIn, signOut } = useAuth();
      const isAuthed = !!user;
      const userName = user?.displayName?.split(" ")[0] || "Anonyme";

      const fb = useFirebase("retro-2026-02-24/feedbacks", [], isAuthed);
      const act = useFirebase("retro-2026-02-24/actions", [], isAuthed);
      const feedbacks = fb.data;
      const actions = act.data;

      const [selectedCat, setSelectedCat] = useState("rock");
      const [feedbackText, setFeedbackText] = useState("");
      const [actionDesc, setActionDesc] = useState("");
      const [actionResp, setActionResp] = useState("");
      const [editingFeedback, setEditingFeedback] = useState(null);
      const [editingAction, setEditingAction] = useState(null);
      const feedbackInputRef = useRef(null);

      if (authLoading) {
        return (
          <div style={{ minHeight: "100vh", background: "#FEF7ED", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 48 }}>🥁</div>
          </div>
        );
      }

      if (!isAuthed) {
        return <LoginScreen onSignIn={signIn} error={authError} loading={authLoading} />;
      }

      const overallStatus = [fb.status, act.status].includes("error") ? "error"
        : [fb.status, act.status].includes("saving") ? "saving"
        : [fb.status, act.status].includes("connecting") ? "connecting" : "synced";

      const addFeedback = () => {
        if (!feedbackText.trim()) return;
        fb.pushItem({ id: Date.now(), category: selectedCat, text: feedbackText.trim(), author: userName });
        setFeedbackText("");
        feedbackInputRef.current?.focus();
      };
      const addAction = () => {
        if (!actionDesc.trim() || actions.length >= 3) return;
        act.pushItem({ id: Date.now(), description: actionDesc.trim(), responsable: actionResp.trim(), done: false });
        setActionDesc(""); setActionResp("");
      };
      const exportJSON = () => {
        const data = { date: new Date().toISOString(), feedbacks, actions };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = "retrospective-2026-02-24.json"; a.click();
        URL.revokeObjectURL(url);
      };
      const resetAll = async () => {
        if (!confirm("⚠️ Remettre à zéro tous les feedbacks et actions ?")) return;
        await fb.setItems([]); await act.setItems([]);
      };
      const getFeedbacksByCategory = (catId) => feedbacks.filter(f => f.category === catId);

      const syncColors = { synced: "#10B981", saving: "#F59E0B", connecting: "#60A5FA", error: "#EF4444" };
      const syncLabels = { synced: "🔴 En direct", saving: "Enregistrement…", connecting: "Connexion…", error: "Erreur" };

      return (
        <div style={{ minHeight: "100vh" }}>
          {/* HEADER with background image */}
          <div style={{
            position: "relative", overflow: "hidden",
            padding: "20px 32px", display: "flex", alignItems: "center",
            justifyContent: "space-between", flexWrap: "wrap", gap: 12,
          }}>
            {/* Background image */}
            <div style={{
              position: "absolute", inset: 0,
              backgroundImage: IMG_HEADER,
              backgroundSize: "cover", backgroundPosition: "center 30%", opacity: 0.1,
            }} />
            {/* Gradient overlay */}
            <div style={{
              position: "absolute", inset: 0,
              background: "linear-gradient(135deg, rgba(192,38,211,0.75) 0%, rgba(219,39,119,0.70) 40%, rgba(232,121,168,0.65) 100%)",
            }} />

            <div style={{ position: "relative", zIndex: 1 }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: "#FDE047", letterSpacing: 2.5 }}>🥁 BACKSTAGE DEBRIEF</div>
              <div style={{ fontSize: 11.5, color: "#fff", opacity: 0.92, marginTop: 2 }}>
                Tous les 15 jours • Mardi 14h30-15h30 • Ce qui se dit en backstage reste en backstage 🤫
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", position: "relative", zIndex: 1 }}>
              {/* User badge with photo */}
              <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.2)", borderRadius: 8, padding: "4px 12px 4px 4px" }}>
                {user.photoURL && <img src={user.photoURL} style={{ width: 24, height: 24, borderRadius: "50%" }} referrerPolicy="no-referrer" />}
                <span style={{ fontSize: 12, color: "#fff", fontWeight: 500 }}>{userName}</span>
              </div>
              {/* Sync */}
              <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.12)", borderRadius: 8, padding: "5px 12px" }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: syncColors[overallStatus],
                  animation: overallStatus === "saving" || overallStatus === "connecting" ? "pulse 1s infinite" : "none" }} />
                <span style={{ fontSize: 11, color: "#fff", opacity: 0.85 }}>{syncLabels[overallStatus]}</span>
              </div>
              <button onClick={exportJSON} className="no-print" style={{
                background: "rgba(255,255,255,0.15)", border: "1.2px solid rgba(255,255,255,0.55)",
                borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, fontWeight: 500, cursor: "pointer",
              }}>⬇ Exporter</button>
              <button onClick={resetAll} className="no-print" style={{
                background: "rgba(255,255,255,0.08)", border: "1.2px solid rgba(255,255,255,0.3)",
                borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, fontWeight: 500, cursor: "pointer", opacity: 0.7,
              }}>🔄 Reset</button>
              <button onClick={signOut} className="no-print" style={{
                background: "rgba(255,255,255,0.08)", border: "1.2px solid rgba(255,255,255,0.3)",
                borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 12, fontWeight: 500, cursor: "pointer", opacity: 0.7,
              }}>Déconnexion</button>
            </div>
          </div>

          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 20px 40px" }}>

            {/* LIVE BANNER */}
            <div style={{
              background: "linear-gradient(135deg, #EDE9FE, #FCE7F3)", borderRadius: 12,
              padding: "10px 18px", marginBottom: 20, display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "#6B21A8",
            }}>
              <span style={{ fontSize: 18 }}>👥</span>
              <div><strong>Mode collaboratif temps réel</strong> — Connecté en tant que {user.displayName}. Tous les retours sont synchronisés instantanément.</div>
            </div>

            {/* RÈGLES DU PIT */}
            <div style={{
              background: "#FFF6EE", borderRadius: 16, padding: 0,
              marginBottom: 24, position: "relative", overflow: "hidden", display: "flex", minHeight: 175,
            }}>
              <div style={{ flex: 1, padding: "22px 28px", zIndex: 1 }}>
                <div style={{ fontSize: 19, fontWeight: 700, color: "#78350F", marginBottom: 14 }}>🎼 Règles du pit</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "9px 40px", maxWidth: 620 }}>
                  {["Respect mutuel", "Focus sur les processus, pas sur les personnes", "Tout le monde participe", "Ce qui est dit en rétro reste en rétro", "On identifie, on propose, on agit"].map((rule, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, color: "#57534E" }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#E11D48", flexShrink: 0 }} />
                      {rule}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ width: 320, minHeight: "100%", flexShrink: 0, position: "relative" }}>
  		{/* Image avec opacité */}
 		 <div style={{
 		   position: "absolute", inset: 0,
  		  backgroundImage: IMG_RULES,
 		   backgroundSize: "cover", backgroundPosition: "center",
 		   opacity: 0.4,
 		 }} />
 		 {/* Dégradé de fondu vers la gauche */}
 		 <div style={{
 		   position: "absolute", inset: 0,
 		   width: 80,
 		   background: "linear-gradient(to right, #FFF6EE, transparent)",
 		 }} />
              </div>
  	   </div>

            {/* 3 COLUMNS */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 24 }}>
              {CATEGORIES.map(cat => {
                const col = COLUMN_MAP[cat.id];
                const items = getFeedbacksByCategory(cat.id);
                return (
                  <div key={cat.id} style={{ background: "#fff", borderRadius: 14, border: "2px solid " + col.border, minHeight: 100, padding: "16px 14px" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: col.color, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                      {col.title}
                      {items.length > 0 && <span style={{ fontSize: 11, fontWeight: 600, background: col.border + "20", color: col.color, borderRadius: 10, padding: "1px 8px" }}>{items.length}</span>}
                    </div>
                    {items.length === 0 && <div style={{ fontSize: 12.5, color: "#9CA3AF", fontStyle: "italic", padding: "6px 0" }}>Aucun retour pour le moment</div>}
                    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                      {items.map(fbk => (
                        <div key={fbk.id} style={{ background: cat.bg, borderRadius: 10, padding: "9px 11px", fontSize: 13, color: "#1F2937", display: "flex", alignItems: "flex-start", gap: 8, border: "1px solid " + col.border + "33", animation: "fadeIn 0.3s ease" }}>
                          {editingFeedback === fbk.id ? (
                            <input autoFocus defaultValue={fbk.text}
                              onBlur={e => { fb.updateItem(fbk.id, { text: e.target.value.trim() || fbk.text }); setEditingFeedback(null); }}
                              onKeyDown={e => e.key === "Enter" && (fb.updateItem(fbk.id, { text: e.target.value.trim() || fbk.text }), setEditingFeedback(null))}
                              style={{ flex: 1, border: "none", background: "transparent", fontSize: 13, fontFamily: "inherit", color: "#1F2937" }}
                            />
                          ) : (
                            <div style={{ flex: 1 }}>
                              <div style={{ cursor: "pointer" }} onClick={() => setEditingFeedback(fbk.id)}>{fbk.text}</div>
                              {fbk.author && <div style={{ fontSize: 10.5, color: col.color, marginTop: 3, opacity: 0.7 }}>— {fbk.author}</div>}
                            </div>
                          )}
                          <button onClick={() => fb.removeItem(fbk.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "#9CA3AF", padding: 0, lineHeight: 1, flexShrink: 0 }}
                            onMouseEnter={e => e.target.style.color = "#EF4444"} onMouseLeave={e => e.target.style.color = "#9CA3AF"}>✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* AJOUTER UN RETOUR */}
            <div className="no-print" style={{ background: "#fff", borderRadius: 16, border: "1px solid #E5E7EB", padding: "20px 24px", marginBottom: 24 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#1F2937", marginBottom: 12 }}>✍ Ajouter un retour</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                {CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setSelectedCat(cat.id)} style={{
                    padding: "5px 15px", borderRadius: 16, fontSize: 12.5, cursor: "pointer",
                    fontWeight: selectedCat === cat.id ? 600 : 500, transition: "all 0.2s",
                    border: selectedCat === cat.id ? "none" : "1.5px solid " + cat.border,
                    background: selectedCat === cat.id ? cat.color : "transparent",
                    color: selectedCat === cat.id ? "#fff" : cat.color,
                  }}>{cat.label}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <input ref={feedbackInputRef} type="text" value={feedbackText}
                  onChange={e => setFeedbackText(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addFeedback()}
                  placeholder="Votre retour..."
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "1px solid #D1D5DB", fontSize: 13.5, background: "#F9FAFB" }}
                  onFocus={e => e.target.style.borderColor = CATEGORIES.find(c => c.id === selectedCat).border}
                  onBlur={e => e.target.style.borderColor = "#D1D5DB"}
                />
                <button onClick={addFeedback} style={{ width: 42, height: 42, borderRadius: 10, border: "none", background: "#7C3AED", color: "#fff", fontSize: 22, fontWeight: 700, cursor: "pointer" }}>+</button>
              </div>
            </div>

            {/* ACTIONS */}
            <div style={{
              background: "linear-gradient(135deg, #FDF2F8, #FCE7F3)",
              borderRadius: 16, padding: 0, marginBottom: 24, position: "relative", overflow: "hidden", display: "flex", minHeight: 240,
            }}>
		<div style={{ width: 280, minHeight: "100%", flexShrink: 0, position: "relative" }}>
 		 {/* Image avec opacité */}
  		<div style={{
  		  position: "absolute", inset: 0,
   		 backgroundImage: IMG_ACTIONS,
   		 backgroundSize: "cover", backgroundPosition: "center top",
   		 opacity: 0.4,
  		}} />
  		{/* Dégradé de fondu vers la droite */}
  		<div style={{
  		  position: "absolute", top: 0, bottom: 0, left: 240, width: 80,
   		 background: "linear-gradient(to left, #FDF2F8, transparent)",
 		 }} />
		</div>

              <div style={{ flex: 1, padding: "20px 24px", position: "relative", zIndex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#9D174D" }}>🎯 Actions pour le prochain sprint</div>
                  <div style={{ border: "1.2px solid #EC4899", borderRadius: 13, padding: "2px 12px", fontSize: 11, fontWeight: 600, color: "#EC4899" }}>{actions.length}/3 max</div>
                </div>
                <div style={{ borderTop: "1px solid rgba(249,168,212,0.4)", marginBottom: 14 }} />

                {actions.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "12px 0", fontSize: 13.5, fontWeight: 600, color: "#6B7280" }}>Aucune action définie pour le moment</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 10 }}>
                    {actions.map(action => (
                      <div key={action.id} style={{ background: "#fff", borderRadius: 10, padding: "10px 12px", display: "flex", alignItems: "center", gap: 10, border: "1px solid #F9A8D4", animation: "fadeIn 0.3s ease" }}>
                        <input type="checkbox" checked={action.done || false} onChange={() => act.updateItem(action.id, { done: !action.done })}
                          style={{ width: 17, height: 17, accentColor: "#DB2777", cursor: "pointer", flexShrink: 0 }}
                        />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          {editingAction === action.id ? (
                            <input autoFocus defaultValue={action.description}
                              onBlur={e => { act.updateItem(action.id, { description: e.target.value }); setEditingAction(null); }}
                              onKeyDown={e => e.key === "Enter" && (act.updateItem(action.id, { description: e.target.value }), setEditingAction(null))}
                              style={{ width: "100%", border: "none", background: "transparent", fontSize: 13, fontFamily: "inherit" }}
                            />
                          ) : (
                            <div onClick={() => setEditingAction(action.id)} style={{ fontSize: 13, color: "#1F2937", cursor: "pointer", textDecoration: action.done ? "line-through" : "none", opacity: action.done ? 0.5 : 1 }}>{action.description}</div>
                          )}
                          {action.responsable && <div style={{ fontSize: 11, color: "#9D174D", marginTop: 1, fontWeight: 500 }}>👤 {action.responsable}</div>}
                        </div>
                        <button onClick={() => act.removeItem(action.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "#9CA3AF" }}
                          onMouseEnter={e => e.target.style.color = "#EF4444"} onMouseLeave={e => e.target.style.color = "#9CA3AF"}>✕</button>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{ borderTop: "1px solid rgba(249,168,212,0.4)", marginBottom: 12, marginTop: 6 }} />

                {actions.length < 3 && (
                  <div className="no-print">
                    <div style={{ fontSize: 12.5, fontWeight: 600, color: "#6B7280", marginBottom: 7 }}>Ajouter une action</div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                      <input type="text" value={actionDesc} onChange={e => setActionDesc(e.target.value)} onKeyDown={e => e.key === "Enter" && addAction()}
                        placeholder="Description de l'action..." style={{ flex: 2, minWidth: 180, padding: "8px 12px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12.5, background: "#fff" }}
                        onFocus={e => e.target.style.borderColor = "#EC4899"} onBlur={e => e.target.style.borderColor = "#D1D5DB"} />
                      <input type="text" value={actionResp} onChange={e => setActionResp(e.target.value)} onKeyDown={e => e.key === "Enter" && addAction()}
                        placeholder="Responsable..." style={{ flex: 1, minWidth: 130, padding: "8px 12px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12.5, background: "#fff" }}
                        onFocus={e => e.target.style.borderColor = "#EC4899"} onBlur={e => e.target.style.borderColor = "#D1D5DB"} />
                    </div>
                    <button onClick={addAction} style={{ width: "100%", padding: "10px 0", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #DB2777, #C026D3)", color: "#fff", fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>+ Ajouter l'action</button>
                  </div>
                )}
              </div>
            </div>

            {/* FOOTER */}
            <div style={{ textAlign: "center", fontSize: 13.5, color: "#DB2777", fontStyle: "italic", opacity: 0.65, padding: "6px 0 16px" }}>
              "On repart avec 2-3 actions concrètes. L'idée : être un peu meilleurs pour le prochain set." 🤘
            </div>
          </div>

          <style>{`
            @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BackstageDebrief />);
  </script>
</body>
</html>
